<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Bus Ticket</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .ticket-container {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            padding: 30px;
            color: white;
            margin: 20px 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .ticket-detail {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        .ticket-detail:last-child {
            border-bottom: none;
        }
        .detail-label {
            font-weight: bold;
        }
        .detail-value {
            text-align: right;
        }
        .qr-container {
            text-align: center;
            margin: 20px 0;
            padding: 20px;
            background: white;
            border-radius: 10px;
        }
        .error-message {
            color: #d32f2f;
            padding: 15px;
            background: #ffebee;
            border-radius: 5px;
            margin: 10px 0;
        }
        .success-message {
            color: #388e3c;
            padding: 15px;
            background: #e8f5e9;
            border-radius: 5px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h2 class="text-center mb-4">🚌 Your Bus Ticket</h2>
        <img src="https://via.placeholder.com/800x400?text=Bus+Ticket" alt="Ticket Background" class="img-fluid mb-3"> 
        <div id="ticket-display" class="card p-4">
            <div class="text-center" style="padding: 30px;">
                <div class="spinner-border" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <p class="mt-3">Loading ticket details...</p>
            </div>
        </div>
        <div class="text-center mt-4">
            <button class="btn btn-primary me-2" onclick="window.print()">🖨 Print Ticket</button>
            <button class="btn btn-secondary" onclick="window.history.back()">← Go Back</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode.js/1.5.3/qrcode.min.js"></script>
    <script>
        console.log('Ticket page loaded');
        
        function loadTicket() {
            try {
                let booking = null;
                
                console.log('Checking sessionStorage for currentBooking...');
                if (sessionStorage.getItem('currentBooking')) {
                    booking = JSON.parse(sessionStorage.getItem('currentBooking'));
                    console.log('Found in sessionStorage:', booking);
                }
                
                console.log('Checking localStorage for bookings...');
                if (!booking && localStorage.getItem('bookings')) {
                    const bookings = JSON.parse(localStorage.getItem('bookings'));
                    if (bookings && bookings.length > 0) {
                        booking = bookings[bookings.length - 1];
                        console.log('Found in localStorage:', booking);
                    }
                }
                
                if (booking && booking.ticketId) {
                    displayTicket(booking);
                } else {
                    showError('No ticket data found. Please complete a booking first.');
                }
            } catch (error) {
                console.error('Error loading ticket:', error);
                showError('Error loading ticket data: ' + error.message);
            }
        }
        
        function displayTicket(booking) {
            try {
                const boardingTime = booking.boardingTime || '10:00 AM';
                const seatsDisplay = Array.isArray(booking.seats) ? booking.seats.join(', ') : booking.seat || 'N/A';
                const dateDisplay = booking.date ? new Date(booking.date).toLocaleDateString() : 'N/A';
                const bookingDateDisplay = booking.bookingDate || new Date().toLocaleDateString();
                
                const ticketHTML = `
                    <div class="ticket-container">
                        <h4 class="mb-3">✅ BOOKING CONFIRMED</h4>
                        <div class="ticket-detail">
                            <span class="detail-label">Ticket ID:</span>
                            <span class="detail-value">${booking.ticketId || 'N/A'}</span>
                        </div>
                        <div class="ticket-detail">
                            <span class="detail-label">Passenger Name:</span>
                            <span class="detail-value">${booking.name || 'N/A'}</span>
                        </div>
                        <div class="ticket-detail">
                            <span class="detail-label">Age:</span>
                            <span class="detail-value">${booking.age || 'N/A'}</span>
                        </div>
                        <div class="ticket-detail">
                            <span class="detail-label">Gender:</span>
                            <span class="detail-value">${booking.gender || 'N/A'}</span>
                        </div>
                        <div class="ticket-detail">
                            <span class="detail-label">Seat Numbers:</span>
                            <span class="detail-value"><strong>${seatsDisplay}</strong></span>
                        </div>
                        <div class="ticket-detail">
                            <span class="detail-label">Bus Number:</span>
                            <span class="detail-value">${booking.busNumber || 'Bus 101'}</span>
                        </div>
                        <div class="ticket-detail">
                            <span class="detail-label">Pickup Location:</span>
                            <span class="detail-value">${booking.pickup || 'N/A'}</span>
                        </div>
                        <div class="ticket-detail">
                            <span class="detail-label">Drop Location:</span>
                            <span class="detail-value">${booking.drop || 'N/A'}</span>
                        </div>
                        <div class="ticket-detail">
                            <span class="detail-label">Journey Date:</span>
                            <span class="detail-value">${dateDisplay}</span>
                        </div>
                        <div class="ticket-detail">
                            <span class="detail-label">Boarding Time:</span>
                            <span class="detail-value">${boardingTime}</span>
                        </div>
                        <div class="ticket-detail">
                            <span class="detail-label">Email:</span>
                            <span class="detail-value">${booking.email || 'N/A'}</span>
                        </div>
                        <div class="ticket-detail">
                            <span class="detail-label">Phone:</span>
                            <span class="detail-value">${booking.phone || 'N/A'}</span>
                        </div>
                        <div class="ticket-detail">
                            <span class="detail-label">Status:</span>
                            <span class="detail-value"><strong>${booking.status || 'Confirmed'}</strong></span>
                        </div>
                    </div>
                    
                    <div class="qr-container">
                        <h5>Confirmation QR Code</h5>
                        <div id="qr-code"></div>
                    </div>
                `;
                
                document.getElementById('ticket-display').innerHTML = ticketHTML;
                
                // Generate QR Code
                try {
                    const qrData = `Ticket: ${booking.ticketId}\nName: ${booking.name}\nBus: ${booking.busNumber}\nSeats: ${seatsDisplay}\nDate: ${booking.date}`;
                    const qrContainer = document.getElementById('qr-code');
                    if (qrContainer) {
                        qrContainer.innerHTML = ''; // Clear previous
                        if (typeof QRCode !== 'undefined') {
                            new QRCode(qrContainer, {
                                text: qrData,
                                width: 150,
                                height: 150
                            });
                            console.log('QR Code generated successfully');
                        } else {
                            qrContainer.innerHTML = '<p>QR Code library not loaded</p>';
                        }
                    }
                } catch (qrError) {
                    console.error('QR Code error:', qrError);
                }
                
                document.getElementById('ticket-display').classList.add('success-message');
                
            } catch (error) {
                console.error('Error displaying ticket:', error);
                showError('Error displaying ticket: ' + error.message);
            }
        }
        
        function showError(message) {
            console.error(message);
            document.getElementById('ticket-display').innerHTML = `
                <div class="error-message">
                    <strong>⚠ Error:</strong> ${message}<br>
                    <small>Make sure you have completed a bus ticket booking before viewing this page.</small>
                </div>
            `;
        }
        
        // Load ticket when page loads
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', loadTicket);
        } else {
            loadTicket();
        }
    </script>
</body>
</html>
