<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RouteX Ticket Generator Demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .demo-container { max-width: 800px; margin: 50px auto; background: white; border-radius: 15px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .sample-data { background: #f8f9fa; border: 1px solid #e9ecef; border-radius: 8px; padding: 15px; margin: 20px 0; font-family: monospace; font-size: 12px; }
    </style>
</head>
<body>
    <div class="demo-container">
        <h1 class="text-center mb-4">🎫 RouteX Ticket Generator Demo</h1>

        <div class="alert alert-info">
            <strong>Sample Booking Data:</strong> This demonstrates how to use the ticket generator with proper booking data.
        </div>

        <div class="sample-data" id="sample-json">
            Loading sample data...
        </div>

        <div class="text-center">
            <button id="generate-ticket-btn" class="btn btn-success btn-lg me-3">
                🎫 Generate Ticket
            </button>
            <button id="download-pdf-btn" class="btn btn-primary btn-lg">
                📥 Download PDF
            </button>
        </div>

        <div id="ticket-preview" class="mt-4" style="display: none;">
            <h3 class="text-center mb-3">Ticket Preview</h3>
            <div id="ticket-content" class="border rounded p-3 bg-light"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode.js/1.5.3/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="ticket-generator.js"></script>

    <script>
        // Sample booking data
        const sampleBooking = {
            "ticketId": "RTX20241225001",
            "name": "Rahul Sharma",
            "age": 28,
            "gender": "Male",
            "seats": ["A1", "A2"],
            "busNumber": "BUS-DEL-001",
            "busType": "AC Sleeper",
            "pickup": "Delhi ISBT Kashmere Gate",
            "drop": "Mumbai Dadar Central",
            "date": "2024-12-25",
            "boardingTime": "22:30",
            "fare": 2500,
            "email": "rahul.sharma@email.com",
            "phone": "+91-9876543210",
            "status": "Confirmed",
            "bookingDate": "2024-12-20"
        };

        // Display sample data
        document.getElementById('sample-json').textContent = JSON.stringify(sampleBooking, null, 2);

        // Generate ticket button
        document.getElementById('generate-ticket-btn').addEventListener('click', function() {
            try {
                // Generate ticket HTML
                const ticketHTML = buildTicketHTML(sampleBooking);

                // Display preview
                document.getElementById('ticket-content').innerHTML = ticketHTML;
                document.getElementById('ticket-preview').style.display = 'block';

                // Initialize PDF generation
                generateTicketPDF(sampleBooking);

                // Scroll to preview
                document.getElementById('ticket-preview').scrollIntoView({ behavior: 'smooth' });

            } catch (error) {
                alert('Error generating ticket: ' + error.message);
                console.error(error);
            }
        });

        // Download PDF button (handled by generateTicketPDF function)
        document.getElementById('download-pdf-btn').addEventListener('click', function() {
            downloadPDF(sampleBooking);
        });
    </script>
</body>
</html>
